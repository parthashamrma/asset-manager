
[build]
  publish = "dist/public"
  command = "npm run build"
  # Ignore secrets in netlify/functions/api.js (temporary file)
  ignore = "netlify/functions/api.js"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  